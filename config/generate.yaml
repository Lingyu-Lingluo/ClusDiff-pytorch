# Base model and LoRA weight configuration
model:
  pretrained_model_name_or_path: "runwayml/stable-diffusion-v1-5" # Can be changed to "CompVis/stable-diffusion-v1-4" later
  # Specify the paths to the previously trained LoRA weights
  unet_lora_path: "./output/unet_lora/adapter_model.safetensors"
  text_encoder_lora_path: "./output/text_encoder_lora/adapter_model.safetensors"

# Data and sampling distribution configuration
data:
  metadata_path: "./data/food-101/images/metadata.jsonl"
  
# Generation configuration
generate:
  # Number of images N to generate for each food (major class, e.g., steak)
  num_images_per_class: 100
  
  # Subclass label selection method:
  # "uniform": Uniform random probability (Method 1: equal probability of selecting each subclass)
  # "inverse_density": Inverse density filling (Method 2: subclasses with fewer original samples have a higher probability of being selected)
  # "proportional": Proportional to clustering (Method 3: sampling based on the true quantity ratio of each subclass in the original dataset)
  label_selection_method: "proportional" 
  
  # Sampling parameters
  num_inference_steps: 50
  guidance_scale: 7.5
  batch_size: 4 
  seed: 40

# Output configuration
output:
  output_dir: "./generated_images"
